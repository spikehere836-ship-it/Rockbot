<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #22c55e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            text-align: center;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(34, 197, 94, 0.2);
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.3s ease-out 0.2s both;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        .checkmark svg {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .text {
            color: #94a3b8;
            font-size: 16px;
            margin-top: 15px;
            line-height: 1.5;
        }
        .loader {
            width: 40px;
            height: 40px;
            margin: 20px auto 0;
            border: 3px solid rgba(34, 197, 94, 0.3);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 12px;
            font-size: 14px;
            color: #22c55e;
        }
        @media (max-width: 480px) {
            .box {
                padding: 30px 25px;
            }
            .title {
                font-size: 22px;
            }
            .checkmark {
                width: 60px;
                height: 60px;
            }
            .checkmark svg {
                width: 35px;
                height: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" stroke="white" stroke-width="2" fill="none"/>
            </svg>
        </div>
        <h1 class="title">Verification Successful</h1>
        <p class="text">Your human verification has been completed successfully.</p>
        <div class="loader"></div>
        <div class="status">Redirecting to bot...</div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let referrerId = urlParams.get('ref');
            let userId = urlParams.get('user');
            
            if (referrerId === 'None' || referrerId === 'null' || referrerId === null) {
                referrerId = null;
            }
            
            let redirectUrl = 'https://t.me/FFFreeLikesRebot?start=Human';
            
            if (referrerId && referrerId !== 'null' && referrerId !== 'None') {
                redirectUrl = `https://t.me/FFFreeLikesRebot?start=verify_done_${referrerId}`;
            } else {
                const randomId = Math.floor(Math.random() * 1000000) + 100000;
                redirectUrl = `https://t.me/FFFreeLikesRebot?start=verify_done_${randomId}`;
            }
            
            setTimeout(function() {
                window.location.replace(redirectUrl);
            }, 2500);
        })();
    </script>
</body>
</html>
